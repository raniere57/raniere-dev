name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências (portfólio)
        run: npm ci

      - name: Build do portfólio
        run: npm run build

      - name: Instalar dependências (demo Sigma)
        run: npm ci --prefix sigma

      - name: Build do demo Sigma
        run: npm run build --prefix sigma

      - name: Agrupar demo em dist/sigma
        run: |
          mkdir -p dist/sigma
          cp -r sigma/dist/. dist/sigma/

      - name: Instalar dependências (demo Sentinel)
        run: npm ci --prefix sentinel

      - name: Build do demo Sentinel
        run: npm run build --prefix sentinel

      - name: Agrupar demo em dist/sentinel
        run: |
          mkdir -p dist/sentinel
          cp -r sentinel/dist/. dist/sentinel/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
